# fly.toml app configuration file generated for ghostwriter-winter-flower-7141 on 2026-01-31T22:44:19-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# FREE TIER OPTIMIZED: This configuration uses free tier limits (256MB RAM, no auto-stop)
# For 24/7 uptime on free tier, keep min_machines_running = 1 and auto_stop_machines = false

app = 'ghostwriter-winter-flower-7141'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = false  # Keep running 24/7 (free tier: 1 VM allowed)
  auto_start_machines = true
  min_machines_running = 1    # Always keep 1 instance running for 24/7 uptime
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'        # Shared CPU (free tier)
  cpus = 1
  memory_mb = 256            # FREE TIER: 256MB RAM (up to 3 VMs free)
