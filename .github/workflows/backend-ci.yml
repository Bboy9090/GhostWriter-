name: Backend CI

on:
  push:
    branches: [ main, copilot/** ]
    paths:
      - 'backend-go/**'
      - 'docker-compose.yml'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend-go/**'
      - 'docker-compose.yml'
      - '.github/workflows/backend-ci.yml'

jobs:
  build:
    name: Build Go Backend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('backend-go/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
          
    - name: Install dependencies
      working-directory: ./backend-go
      run: go mod download
      
    - name: Verify dependencies
      working-directory: ./backend-go
      run: go mod verify
      
    - name: Build
      working-directory: ./backend-go
      run: go build -v -o server ./cmd/server
      
    - name: Check binary
      working-directory: ./backend-go
      run: |
        ls -lh server
        file server
        
    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: ghostwriter-backend
        path: backend-go/server
        retention-days: 7

  test:
    name: Test Go Backend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        
    - name: Run tests
      working-directory: ./backend-go
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
      
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./backend-go/coverage.txt
        flags: backend
        
  lint:
    name: Lint Go Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        working-directory: backend-go
        
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      working-directory: ./backend-go
      run: docker build -t ghostwriter-backend:test .
      
    - name: Test Docker image
      run: |
        docker images | grep ghostwriter-backend
