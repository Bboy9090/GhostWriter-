# Render.com Blueprint for GhostWriter
# This file enables one-click deployment on Render.com
# Deploy: https://render.com/deploy
#
# Deployment order: databases + redis first, then API, then static site
# (static site needs ghostwriter-api host for VITE_* env vars)

services:
  # Redis / Key Value (must be in services, not databases)
  - type: keyvalue
    name: ghostwriter-redis
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow internal connections
    plan: free

  # Backend API - Go Service (must deploy before static site for fromService refs)
  - type: web
    name: ghostwriter-api
    runtime: go
    rootDir: backend-go
    buildCommand: go build -o bin/ghostwriter ./cmd/server
    startCommand: ./bin/ghostwriter
    envVars:
      - key: PORT
        value: 8080
      - key: JWT_SECRET
        generateValue: true  # Generates 32-byte cryptographically secure random string
      # ── Database ────────────────────────────────────────────────────────────
      # Set MONGODB_URI to a mongodb:// or mongodb+srv:// connection string to
      # use MongoDB (e.g. from MongoDB Atlas or Railway).
      # Leave it unset to fall back to DB_URL (Render's managed PostgreSQL below).
      - key: MONGODB_URI
        sync: false          # user must supply the value in the Render dashboard
      - key: DB_URL
        fromDatabase:
          name: ghostwriter-db
          property: connectionString
      # ────────────────────────────────────────────────────────────────────────
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ghostwriter-redis
          property: connectionString
    healthCheckPath: /health

  # Frontend - Static Site (after API so fromService can resolve)
  - type: web
    name: ghostwriter
    runtime: static
    buildCommand: NODE_ENV=development npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        fromService:
          type: web
          name: ghostwriter-api
          property: host
      - key: VITE_WS_URL
        fromService:
          type: web
          name: ghostwriter-api
          property: host

databases:
  # PostgreSQL Database
  - name: ghostwriter-db
    databaseName: ghostwriter_vault
    user: ghostwriter_user
    plan: free
